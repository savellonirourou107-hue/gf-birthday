<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff8fa3">
    <meta name="description" content="小团，生日快乐。这是一封阳写给你的生日信。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="小团，生日快乐！">
    <meta property="og:description" content="一封阳写给小团的生日信，藏着今天的惊喜和很多喜欢。">
    <meta property="og:image" content="https://yangyangtuan.github.io/gf-birthday/assets/images/preview.jpg">
    <meta property="og:url" content="https://yangyangtuan.github.io/gf-birthday/">
    <link rel="canonical" href="https://yangyangtuan.github.io/gf-birthday/">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%F0%9F%92%9D%3C/text%3E%3C/svg%3E">
    <title>💝 小团，生日快乐！</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 信封开屏 -->
    <div id="envelope-screen" class="envelope-screen">
        <div class="envelope-wrapper">
            <div class="envelope-float">
                <svg class="envelope-svg" viewBox="0 0 400 320" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- 纸张纹理 -->
                        <filter id="paper-texture" x="0%" y="0%" width="100%" height="100%">
                            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="5" result="noise" />
                            <feColorMatrix type="saturate" values="0" in="noise" result="gray" />
                            <feComponentTransfer in="gray" result="soft">
                                <feFuncA type="linear" slope="0.07" />
                            </feComponentTransfer>
                            <feBlend in="SourceGraphic" in2="soft" mode="multiply" />
                        </filter>
                        <!-- 柔光纹理 -->
                        <filter id="paper-subtle" x="0%" y="0%" width="100%" height="100%">
                            <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="3" result="noise" />
                            <feColorMatrix type="saturate" values="0" in="noise" result="gray" />
                            <feComponentTransfer in="gray" result="soft">
                                <feFuncA type="linear" slope="0.04" />
                            </feComponentTransfer>
                            <feBlend in="SourceGraphic" in2="soft" mode="multiply" />
                        </filter>
                        <!-- 信封投影 -->
                        <filter id="envelope-shadow" x="-10%" y="-10%" width="130%" height="140%">
                            <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0a0505" flood-opacity="0.55" />
                            <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0a0505" flood-opacity="0.25" />
                        </filter>
                        <!-- 信纸投影 -->
                        <filter id="letter-shadow" x="-10%" y="-10%" width="120%" height="130%">
                            <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2d1510" flood-opacity="0.35" />
                        </filter>
                        <!-- 渐变 -->
                        <linearGradient id="paper-grad" x1="0" y1="0" x2="0.3" y2="0.7">
                            <stop offset="0%" stop-color="#faf2e8" />
                            <stop offset="100%" stop-color="#e8d2bc" />
                        </linearGradient>
                        <linearGradient id="flap-grad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#fdf6ee" />
                            <stop offset="25%" stop-color="#f5e4d2" />
                            <stop offset="100%" stop-color="#dbbc9f" />
                        </linearGradient>
                        <linearGradient id="pocket-grad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#f2ddcb" />
                            <stop offset="100%" stop-color="#d4af94" />
                        </linearGradient>
                        <linearGradient id="seal-grad" x1="0.3" y1="0.2" x2="0.7" y2="0.8">
                            <stop offset="0%" stop-color="#e85570" />
                            <stop offset="40%" stop-color="#c43850" />
                            <stop offset="100%" stop-color="#8b1a35" />
                        </linearGradient>
                        <linearGradient id="letter-grad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#fffef9" />
                            <stop offset="100%" stop-color="#f5e8d6" />
                        </linearGradient>
                    </defs>

                    <!-- 信封背板 -->
                    <g filter="url(#envelope-shadow)">
                        <rect class="env-back" x="20" y="60" width="360" height="230" rx="12" fill="url(#paper-grad)" filter="url(#paper-texture)" />
                    </g>
                    <!-- 背板内框装饰 -->
                    <rect class="env-border" x="42" y="90" width="316" height="178" rx="4" fill="none" stroke="rgba(139,107,94,0.25)" stroke-width="1" stroke-dasharray="0" />

                    <!-- 信纸 -->
                    <g class="env-letter-group" filter="url(#letter-shadow)">
                        <rect class="env-letter-rect" x="48" y="76" width="304" height="176" rx="6" fill="url(#letter-grad)" filter="url(#paper-subtle)" />
                        <!-- 信纸横线 -->
                        <line x1="72" y1="110" x2="328" y2="110" stroke="rgba(180,150,130,0.3)" stroke-width="0.8" />
                        <line x1="72" y1="130" x2="328" y2="130" stroke="rgba(180,150,130,0.3)" stroke-width="0.8" />
                        <line x1="72" y1="150" x2="310" y2="150" stroke="rgba(180,150,130,0.3)" stroke-width="0.8" />
                        <!-- 信纸文字 -->
                        <text class="letter-text title-text" x="200" y="104" text-anchor="middle" fill="#9d314a" font-size="15" font-family="Georgia, 'ZCOOL XiaoWei', serif">小团，生日快乐</text>
                        <text class="letter-text body-text" x="200" y="126" text-anchor="middle" fill="#7b4b42" font-size="12" font-family="Georgia, 'ZCOOL XiaoWei', serif">今天这封信，只写给你</text>
                    </g>

                    <!-- 左侧折片 -->
                    <path class="env-side env-side-left" d="M20,60 L20,290 Q20,300 30,300 L200,300 L200,60 Z" fill="url(#pocket-grad)" filter="url(#paper-subtle)" opacity="0.92" />
                    <!-- 右侧折片 -->
                    <path class="env-side env-side-right" d="M380,60 L380,290 Q380,300 370,300 L200,300 L200,60 Z" fill="url(#pocket-grad)" filter="url(#paper-subtle)" opacity="0.92" />

                    <!-- 前口袋 V 形 -->
                    <path class="env-pocket" d="M20,160 L200,280 L380,160 L380,290 Q380,300 370,300 L30,300 Q20,300 20,290 Z" fill="url(#pocket-grad)" filter="url(#paper-texture)" />

                    <!-- 口袋 V 形暗边 -->
                    <path class="env-pocket-rim" d="M20,160 L200,280 L380,160" fill="none" stroke="rgba(120,80,60,0.2)" stroke-width="1.5" />

                    <!-- 翻盖打开后的阴影 -->
                    <ellipse class="env-lip-shadow" cx="200" cy="160" rx="140" ry="15" fill="rgba(40,15,8,0.3)" filter="url(#letter-shadow)" opacity="0" />

                    <!-- 封口翻盖 -->
                    <g class="env-flap-group" transform-origin="200 0">
                        <path class="env-flap-path" d="M20,60 Q20,58 22,58 L200,155 L378,58 Q380,58 380,60 L380,62 Q380,56 378,54 L200,150 L22,54 Q20,56 20,62 Z" fill="url(#flap-grad)" filter="url(#paper-texture)" />
                        <!-- 翻盖覆盖实际区域 -->
                        <path d="M20,58 L200,158 L380,58 L380,0 L20,0 Z" fill="url(#flap-grad)" filter="url(#paper-texture)" />
                    </g>

                    <!-- 蜡封 -->
                    <g class="env-seal-group">
                        <circle cx="200" cy="155" r="24" fill="rgba(0,0,0,0.18)" filter="url(#letter-shadow)" />
                        <circle class="env-seal-circle" cx="200" cy="155" r="22" fill="url(#seal-grad)" />
                        <circle cx="200" cy="155" r="22" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" />
                        <text class="env-seal-heart" x="200" y="161" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="18">♥</text>
                    </g>

                    <!-- 收件人 -->
                    <text class="env-to-text" x="200" y="242" text-anchor="middle" fill="rgba(112,75,64,0.9)" font-size="16" font-family="Georgia, 'ZCOOL XiaoWei', serif" letter-spacing="6">小团 亲启</text>

                    <!-- 光芒 -->
                    <ellipse class="env-glow" cx="200" cy="130" rx="120" ry="70" fill="rgba(255,210,160,0)" />
                </svg>
            </div>
            <p class="envelope-hint">点 击 打 开 信 件</p>
        </div>
    </div>

    <!-- 开场生日弹窗 -->
    <div id="birthday-modal" class="birthday-modal hidden">
        <div class="modal-content">
            <div class="modal-cake">🎂</div>
            <h2 class="modal-title">小团，生日快乐！</h2>
            <p class="modal-subtitle">今天这封信，只写给全世界最特别的小团</p>
            <p class="modal-hint">先收下阳准备的三个小心意吧</p>
            <button id="modal-start-btn" class="modal-start-btn">💝 准备好了！</button>
        </div>
    </div>

    <!-- 主要内容容器 -->
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-title">
            <h1>🎂 小团，生日快乐</h1>
            <div class="title-decoration">
                <span>❤</span>
                <span>❤</span>
                <span>❤</span>
            </div>
        </div>

        <!-- 问答区域 -->
        <div id="quiz-section" class="quiz-section hidden">
            <div class="quiz-card">
                <div class="quiz-progress">
                    <span class="quiz-dot active" data-q="1"></span>
                    <span class="quiz-dot" data-q="2"></span>
                    <span class="quiz-dot" data-q="3"></span>
                </div>
                <h3 id="quiz-question" class="quiz-question"></h3>
                <div id="quiz-options" class="quiz-options"></div>
                <div id="quiz-result" class="quiz-result hidden">
                    <div class="result-icon">🎉</div>
                    <h3>生日心意已送达</h3>
                    <p>小团，愿你今天被鲜花、蛋糕和喜欢包围</p>
                    <p class="result-sub">接下来，是阳认真写给你的话 💕</p>
                    <button id="quiz-continue-btn" class="modal-start-btn">打开这封信 →</button>
                </div>
            </div>
        </div>

        <!-- 情话显示区域 -->
        <div class="love-message">
            <div class="message-decoration left">❀</div>
            <p id="message" class="message"></p>
            <div class="message-decoration right">❀</div>
        </div>
        
        <!-- 按钮组 -->
        <div class="button-group">
            <!-- 心形按钮 -->
            <button id="refresh-btn" class="heart-btn" title="换一句情话">
                <svg class="heart-icon" viewBox="0 0 32 32">
                    <path d="M16,28.261c0,0-14-7.926-14-17.046c0-8.565,9.333-11.816,14-4.399
                             c4.667-7.417,14-4.166,14,4.399C30,20.335,16,28.261,16,28.261z"/>
                </svg>
            </button>
            <!-- 分享按钮 -->
            <button id="share-btn" class="share-btn" title="分享给好友">
                <svg class="share-icon" viewBox="0 0 24 24">
                    <path d="M18,16.08c-0.76,0-1.44,0.3-1.96,0.77L8.91,12.7C8.96,12.47,9,12.24,9,12s-0.04-0.47-0.09-0.7l7.05-4.11
                           c0.54,0.5,1.25,0.81,2.04,0.81c1.66,0,3-1.34,3-3s-1.34-3-3-3s-3,1.34-3,3c0,0.24,0.04,0.47,0.09,0.7L8.04,9.81
                           C7.5,9.31,6.79,9,6,9c-1.66,0-3,1.34-3,3s1.34,3,3,3c0.79,0,1.5-0.31,2.04-0.81l7.12,4.16c-0.05,0.21-0.08,0.43-0.08,0.65
                           c0,1.61,1.31,2.92,2.92,2.92s2.92-1.31,2.92-2.92S19.61,16.08,18,16.08z"/>
                </svg>
            </button>
        </div>

        <!-- 3D相册 -->
        <div class="album-section">
            <div class="album-container">
                <div class="album">
                    <div class="photo-card" style="--i:1">
                        <img src="assets/images/photo1.jpg" alt="照片1">
                    </div>
                    <div class="photo-card" style="--i:2">
                        <img src="assets/images/photo2.jpg" alt="照片2">
                    </div>
                    <div class="photo-card" style="--i:3">
                        <img src="assets/images/photo3.jpg" alt="照片3">
                    </div>
                    <div class="photo-card" style="--i:4">
                        <img src="assets/images/photo4.jpg" alt="照片4">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 留言板开关按钮 -->
    <button id="message-board-toggle" class="message-board-toggle" title="留言板">
        <span class="toggle-icon">💕</span>
    </button>

    <!-- 留言板侧边栏 -->
    <div class="message-board">
        <h2>💕 爱的留言板</h2>
        <div class="message-container">
            <div class="messages" id="message-list"></div>
            <div class="message-input">
                <input type="text" id="name-input" placeholder="你的名字" maxlength="20">
                <textarea id="message-input" placeholder="写下你的祝福..." maxlength="100"></textarea>
                <button id="send-btn">发送祝福 💝</button>
            </div>
        </div>
    </div>

    <!-- 音乐控制 -->
    <div class="music-control">
        <audio id="bgm" loop>
            <source src="assets/music/love.mp3" type="audio/mpeg">
        </audio>
        <button id="music-btn" class="music-btn" title="背景音乐">🎵</button>
    </div>

    <!-- 飘落的爱心背景 -->
    <div class="hearts-bg"></div>

    <script src="js/main.js"></script>
</body>
</html>
