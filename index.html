<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff8fa3">
    <meta name="description" content="小团，生日快乐。这是一封阳写给你的生日信。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="小团，生日快乐！">
    <meta property="og:description" content="小团，生日快乐。阳写给你的一封信。">
    <meta property="og:image" content="https://savellonirourou107-hue.github.io/gf-birthday/assets/images/preview.jpg">
    <meta property="og:url" content="https://savellonirourou107-hue.github.io/gf-birthday/">
    <link rel="canonical" href="https://savellonirourou107-hue.github.io/gf-birthday/">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='52'%3E%F0%9F%92%9D%3C/text%3E%3C/svg%3E">
    <title>💝 小团，生日快乐！</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="intro-pending">
    <!-- 背景粒子层 -->
    <div id="page-particles" class="particles-layer" aria-hidden="true"></div>

    <!-- 进入页面蒙版 -->
    <div id="intro-mask" class="intro-mask" role="button" tabindex="0" aria-label="进入生日页面">
        <div class="intro-heart" aria-hidden="true">♥</div>
        <p class="intro-copy">轻轻点一下，拆开这封信</p>
    </div>

    <!-- 信封开屏 -->
    <div id="envelope-screen" class="envelope-screen">
        <div class="envelope-wrapper">
            <div class="envelope-float">
                <div class="css-envelope" role="button" tabindex="0" aria-label="打开信封">
                    <div class="css-envelope-back"></div>
                    <div class="css-letter">
                        <p class="css-letter-title">小团，生日快乐</p>
                        <p class="css-letter-sub">两情若是久长时，又岂在朝朝暮暮</p>
                    </div>
                    <div class="css-envelope-flap"></div>
                    <div class="css-envelope-left"></div>
                    <div class="css-envelope-right"></div>
                    <div class="css-envelope-pocket"></div>
                    <div class="css-envelope-seal">♥</div>
                    <p class="css-envelope-to">小团 亲启</p>
                </div>
            </div>
            <p class="envelope-hint">点 击 打 开 信 件</p>
        </div>
    </div>

    <!-- 开场生日弹窗 -->
    <div id="birthday-modal" class="birthday-modal hidden">
        <div class="modal-content">
            <div class="modal-cake">🎂</div>
            <h2 class="modal-title">小团，生日快乐！</h2>
            <p class="modal-subtitle">小团，今天有些话想对你说</p>
            <p class="modal-hint">不过先回答三个小问题，看你了不了解我</p>
            <button id="modal-start-btn" class="modal-start-btn">点这里</button>
        </div>
    </div>

    <!-- 主要内容容器 -->
    <div class="container">
        <!-- 页面标题 -->
        <div class="page-title">
            <h1>🎂 小团，生日快乐</h1>
            <div class="title-decoration">
                <span>❤</span>
                <span>❤</span>
                <span>❤</span>
            </div>
        </div>

        <!-- 问答区域 -->
        <div id="quiz-section" class="quiz-section hidden">
            <div id="quiz-particles" class="quiz-particles-layer" aria-hidden="true"></div>
            <div class="quiz-card">
                <div class="quiz-progress">
                    <span class="quiz-dot active" data-q="1"></span>
                    <span class="quiz-dot" data-q="2"></span>
                    <span class="quiz-dot" data-q="3"></span>
                    <span class="quiz-dot" data-q="4"></span>
                    <span class="quiz-dot" data-q="5"></span>
                </div>
                <h3 id="quiz-question" class="quiz-question"></h3>
                <div id="quiz-options" class="quiz-options"></div>
                <div id="quiz-result" class="quiz-result hidden">
                    <div class="result-icon">🎉</div>
                    <h3>我就知道你都懂</h3>
                    <p>生日快乐，小团</p>
                    <p class="result-sub">好啦，给你看信</p>
                    <button id="quiz-continue-btn" class="modal-start-btn">翻开 →</button>
                </div>
            </div>
        </div>

        <!-- 长信区域 -->
        <div id="long-letter" class="long-letter-section hidden">
            <div id="letter-sakura-layer" class="quiz-particles-layer" aria-hidden="true"></div>
            <div class="letter-paper-wrapper">
                <div class="letter-paper">
                    <div class="letter-dear">亲爱的小团：</div>
                    <div id="letter-body" class="letter-body"></div>
                    <div id="letter-sign" class="letter-sign hidden">
                        <span class="letter-sign-name">阳</span>
                        <span class="letter-sign-date"></span>
                    </div>
                    <div id="letter-done" class="letter-done-btn hidden">
                        <button id="letter-continue-btn" class="modal-start-btn">看完了，继续往下</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 情话显示区域 -->
        <div class="love-message">
            <div class="message-decoration left">❀</div>
            <p id="message" class="message"></p>
            <div class="message-decoration right">❀</div>
        </div>
        
        <!-- 按钮组 -->
        <div class="button-group">
            <!-- 心形按钮 -->
            <button id="refresh-btn" class="heart-btn" title="换一句情话">
                <svg class="heart-icon" viewBox="0 0 32 32">
                    <path d="M16,28.261c0,0-14-7.926-14-17.046c0-8.565,9.333-11.816,14-4.399
                             c4.667-7.417,14-4.166,14,4.399C30,20.335,16,28.261,16,28.261z"/>
                </svg>
            </button>
            <!-- 分享按钮 -->
            <button id="share-btn" class="share-btn" title="分享给好友">
                <svg class="share-icon" viewBox="0 0 24 24">
                    <path d="M18,16.08c-0.76,0-1.44,0.3-1.96,0.77L8.91,12.7C8.96,12.47,9,12.24,9,12s-0.04-0.47-0.09-0.7l7.05-4.11
                           c0.54,0.5,1.25,0.81,2.04,0.81c1.66,0,3-1.34,3-3s-1.34-3-3-3s-3,1.34-3,3c0,0.24,0.04,0.47,0.09,0.7L8.04,9.81
                           C7.5,9.31,6.79,9,6,9c-1.66,0-3,1.34-3,3s1.34,3,3,3c0.79,0,1.5-0.31,2.04-0.81l7.12,4.16c-0.05,0.21-0.08,0.43-0.08,0.65
                           c0,1.61,1.31,2.92,2.92,2.92s2.92-1.31,2.92-2.92S19.61,16.08,18,16.08z"/>
                </svg>
            </button>
        </div>

        <!-- 3D相册 -->
        <div class="album-section">
            <div class="album-container">
                <div class="album">
                    <div class="photo-card" style="--r:-4deg">
                        <img src="assets/images/photo1.jpg" alt="照片1">
                        <p class="polaroid-caption">第一次心动</p>
                    </div>
                    <div class="photo-card" style="--r:3deg">
                        <img src="assets/images/photo2.jpg" alt="照片2">
                        <p class="polaroid-caption">想把今天留住</p>
                    </div>
                    <div class="photo-card" style="--r:-2deg">
                        <img src="assets/images/photo3.jpg" alt="照片3">
                        <p class="polaroid-caption">和你有关的温柔</p>
                    </div>
                    <div class="photo-card" style="--r:5deg">
                        <img src="assets/images/photo4.jpg" alt="照片4">
                        <p class="polaroid-caption">生日快乐，小团</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 留言板开关按钮 -->
    <button id="message-board-toggle" class="message-board-toggle" title="留言板">
        <span class="toggle-icon">💕</span>
    </button>

    <!-- 留言板侧边栏 -->
    <div class="message-board">
        <h2>给小团留句话吧</h2>
        <div class="message-container">
            <div class="messages" id="message-list"></div>
            <div class="message-input">
                <input type="text" id="name-input" placeholder="你的名字" maxlength="20">
                <textarea id="message-input" placeholder="想对小团说什么..." maxlength="100"></textarea>
                <button id="send-btn">留下祝福</button>
            </div>
        </div>
    </div>

    <!-- 音乐控制 -->
    <div class="music-control" id="music-player">
        <audio id="bgm" loop>
            <source src="assets/music/love.mp3" type="audio/mpeg">
        </audio>
        <button id="music-toggle" class="music-toggle" title="展开音乐播放器">
            <span class="music-disc">♪</span>
        </button>
        <div class="music-panel" aria-label="背景音乐播放器">
            <button id="music-btn" class="music-play-btn" title="播放或暂停">▶</button>
            <div class="music-progress" aria-hidden="true">
                <span id="music-progress-bar"></span>
            </div>
            <span id="music-time" class="music-time">0:00</span>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
